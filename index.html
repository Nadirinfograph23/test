<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نادي الإعلام</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @tailwind base;
        @tailwind components;
        @tailwind utilities;

        body {
            font-family: 'Lato', sans-serif;
        }

        .header {
            background-color: #333;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: bold;
        }

        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 2rem;
            gap: 2rem;
        }

        .news {
            background-color: #f7f7f7;
            padding: 1rem;
            border-radius: 0.5rem;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .news img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 0.5rem 0.5rem 0 0;
        }

        .news p {
            margin-bottom: 1rem;
        }

        .reviews {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            gap: 2rem;
        }

        .review {
            background-color: #f7f7f7;
            padding: 1rem;
            border-radius: 0.5rem;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .review img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 1rem;
        }

        .review p {
            margin-bottom: 1rem;
        }

        .rating {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #333;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>نادي الإعلام</h1>
    </header>
    <main class="main">
        <section class="news">
            <img src="https://picsum.photos/200/300" alt="خبر">
            <h2>عنوان الخبر</h2>
            <p>описание الخبر</p>
        </section>
        <section class="reviews">
            <h2>شهادات/مراجعات</h2>
            <div class="review">
                <img src="https://picsum.photos/50/50" alt="موظف">
                <h3>أسم الموظف</h3>
                <p>وصف الموظف</p>
                <div class="rating">
                    <i class="fa fa-star"></i>
                    <i class="fa fa-star"></i>
                    <i class="fa fa-star"></i>
                    <i class="fa fa-star"></i>
                    <i class="fa fa-star-o"></i>
                </div>
            </div>
            <div class="review">
                <img src="https://picsum.photos/50/50" alt="موظف">
                <h3>أسم الموظف</h3>
                <p>وصف الموظف</p>
                <div class="rating">
                    <i class="fa fa-star"></i>
                    <i class="fa fa-star"></i>
                    <i class="fa fa-star"></i>
                    <i class="fa fa-star"></i>
                    <i class="fa fa-star-o"></i>
                </div>
            </div>
        </section>
        <section class="search">
            <h2>بحث</h2>
            <form>
                <input type="search" placeholder="البحث عن...">
                <button type="submit">بحث</button>
            </form>
        </section>
    </main>
</body>
</html>
